name: Deploy Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build -- --base /${{ github.event.repository.name }}/
      - name: Inject base tag into 404.html for SPA fallback
        run: |
          sed -i 's|<head>|<head><script>(function(){var s=window.location.pathname.split("/");if(s.length>=3){var b=document.createElement("base");b.href=s.slice(0,3).join("/")+"/";document.head.insertBefore(b,document.head.firstChild)}})()</script>|' dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
